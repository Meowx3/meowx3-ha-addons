name: "GPS NTP MQTT Server"
slug: "gps_ntp_mqtt"
version: "1.0.0"
description: "Offline NTP server using GPS + PPS with MQTT telemetry"
startup: services
boot: auto
init: false
host_network: true

arch:
  - aarch64
  - amd64

devices:
  - /dev/ttyUSB0
  - /dev/ttyACM0
  - /dev/ttyACM1
  - /dev/pps0

usb: true
privileged:
  - SYS_TIME
  - SYS_NICE

ports:
  "123/udp": 123

options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  use_pps: true

schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  use_pps: bool


panel_icon: mdi:clock-outline
homeassistant_api: true
